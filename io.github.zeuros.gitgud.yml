app-id: io.github.zeuros.gitgud
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "24.08"
command: gitgud
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=home
  - --socket=ssh-auth
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.portal.FileChooser
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: gitgud
    buildsystem: simple
    build-commands:
      - install -Dm755 bin/gitgud /app/bin/gitgud
      - install -Dm644 io.github.zeuros.gitgud.desktop
          /app/share/applications/io.github.zeuros.gitgud.desktop
      - install -Dm644 io.github.zeuros.gitgud.metainfo.xml
          /app/share/metainfo/io.github.zeuros.gitgud.metainfo.xml
      - for s in 16 32 48 64 128 256 512; do
          install -Dm644 icons/${s}x${s}.png
            /app/share/icons/hicolor/${s}x${s}/apps/io.github.zeuros.gitgud.png;
        done

    sources:
      # x86_64 binary — updated by scripts/update-flatpak-manifest.py on each release
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/zeuros/gitgud/releases/download/v2.5.0/GitGud-2.5.0-Linux-x64.tar.gz
        sha256: 26098b4c43c23103c1e82cddea9de7a59297667375970d3e9484afda4673cf22

      # aarch64 binary — updated by scripts/update-flatpak-manifest.py on each release
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/zeuros/gitgud/releases/download/v2.5.0/GitGud-2.5.0-Linux-arm64.tar.gz
        sha256: a93315a900415bff837aabbcedabf657e0c6782e6e3b46619fc4666eafb84f96

      - type: file
        path: io.github.zeuros.gitgud.desktop

      - type: file
        path: io.github.zeuros.gitgud.metainfo.xml

      - type: dir
        path: icons
        dest: icons
